# fly.toml app configuration file generated for chatroomtest-app-munn on 2026-03-02T10:54:38-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'munn-chat-live'
primary_region = 'ewr'

[build]

[env]
  PORT = '8080'
  DB_PATH = '/data/chat.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source="sqlite_data"
  destination="/data"
